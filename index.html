    <style>
        * {

        header {
            display: grid;
            grid-template-columns: 1fr 8fr 1fr;

        nav {

        aside {

        main {

        }

        footer {
            display: grid;
            grid-template-columns: 1fr 1fr 5fr 1fr 1fr 1fr;
        }

<body>

    <template>
    </template>

    <nav style="background:;width:100%;height:50px;">
