<!DOCTYPE html>

<html lang="en-US" dir="ltr">

<head>

    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="3600">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="author" content="Kevin Huang">
    <meta name="description" content="A coding and music portfolio website.">
    <meta name="keywords"
        content="CSS, FabFilter, FL Studio, HTML, iZotope, JavaScript, Music Production, Software Development">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="scripts.js" defer></script>
    <base href="" target="_self">

    <title>AP DESIGNS - CONTACT</title>
    <noscript>Your browser does not support scripts.</noscript>

    <style>
    </style>

</head>

<body onload="changeTheme()">

    <template>
    </template>

    <header>

        <h1>AP Designs by Kevin Huang</h1>

        <nav>

            <button onclick="document.location='about.html'">About</button>
            <button onclick="document.location='resume.html'">Resume</button>
            <button onclick="document.location='portfolio.html'">Portfolio</button>
            <button onclick="document.location='contact.html'">Contact</button>

        </nav>

        <section>

            <a href="https://instagram.com" target="_blank">
                <img src="assets/link-instagram.png" alt="Link to Instagram Profile" width="128" height="128"></a>
            <a href="https://twitter.com" target="_blank">
                <img src="assets/link-twitter.png" alt="Link to Twitter Profile" width="128" height="128"></a>
            <a href="https://spotify.com" target="_blank">
                <img src="assets/link-spotify.png" alt="Link to Spotify Profile" width="128" height="128"></a>
            <a href="https://youtube.com" target="_blank">
                <img src="assets/link-youtube.png" alt="Link to YouTube Profile" width="128" height="128"></a>
            <a href="https://soundcloud.com" target="_blank">
                <img src="assets/link-soundcloud.png" alt="Link to SoundCloud Profile" width="128" height="128"></a>

        </section>

    </header>

    <aside>
    </aside>

    <hr>

    <main id="contact">

        <form action="contact.html" method="get" enctype="multipart/form-data">

            <input id="formText" type="text" placeholder="NAME" required>
            <input id="formEmail" type="email" placeholder="EMAIL" required>
            <textarea id="formArea" cols="100" rows="10" minlength="10" maxlength="500"></textarea>
            <input type="submit" value="SUBMIT">
            <input type="reset" value="RESET">

        </form>

    </main>

    <hr>

    <footer>

        <button>&copy; 2023 AP DESIGNS</button>

        <div>
            <button onclick="themeLight()">Light</button>
            <button onclick="themeDark()">Dark</button>
        </div>

    </footer>
